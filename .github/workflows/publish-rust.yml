name: Publish Rust Client

on:
  workflow_dispatch:
    inputs:
      publish-to-crates:
        description: 'Publish to crates.io'
        required: true
        default: true
        type: boolean
      create-github-release:
        description: 'Create GitHub release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: rust-client-publish
  cancel-in-progress: false

jobs:
  guard-allowed-branch:
    name: Guard allowed source branch for release publish
    runs-on: ubuntu-latest
    steps:
      - name: Guard allowed source branch for release publish
        run: |
          case "${{ github.ref }}" in
            refs/heads/main|refs/heads/hotfix/*) ;;
            *)
              echo "::error::Publish Rust Client must be run from main or hotfix/*. Current ref: ${{ github.ref }}"
              exit 1
              ;;
          esac

  publish:
    name: Publish subscriptions-client crate
    runs-on: ubuntu-latest
    needs: guard-allowed-branch
    defaults:
      run:
        working-directory: clients/rust
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git user
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Build check
        run: cargo build

      - name: Get current version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing subscriptions-client v$VERSION"

      - name: Check if prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.version.outputs.version }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        working-directory: .
        run: |
          TAG="rust-client-v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            echo "Created tag $TAG"
          fi
          git push origin "$TAG" 2>/dev/null || echo "Tag already pushed"

      - name: Authenticate crates.io trusted publisher
        if: ${{ inputs.publish-to-crates }}
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish to crates.io
        if: ${{ inputs.publish-to-crates }}
        run: cargo publish --locked

      - name: Create GitHub Release
        if: ${{ inputs.create-github-release }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = `rust-client-v${{ steps.version.outputs.version }}`;
            const releaseName = `Rust Client v${{ steps.version.outputs.version }}`;
            const isPrerelease = '${{ steps.prerelease.outputs.is_prerelease }}' === 'true';

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });
              console.log(`Release ${tagName} already exists, skipping`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              body: `Release of subscriptions-client v${{ steps.version.outputs.version }}\n\n**crates.io:** https://crates.io/crates/subscriptions-client/${{ steps.version.outputs.version }}`,
              draft: false,
              prerelease: isPrerelease,
            });

      - name: Publish summary
        run: |
          echo "## subscriptions-client Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: \`rust-client-v${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.publish-to-crates }}" == "true" ]; then
            echo "Published to crates.io: https://crates.io/crates/subscriptions-client/${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "Skipped crates.io publish" >> $GITHUB_STEP_SUMMARY
          fi
