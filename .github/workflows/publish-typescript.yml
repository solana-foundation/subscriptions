name: Publish TypeScript Client

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (unchecked will publish to npm, push git tag, and create GitHub release)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ts-client-publish
  cancel-in-progress: false

jobs:
  guard-allowed-branch:
    name: Guard allowed source branch for release publish
    runs-on: ubuntu-latest
    steps:
      - name: Guard allowed source branch for release publish
        run: |
          case "${{ github.ref }}" in
            refs/heads/main) ;;
            *)
              echo "::error::Publish TypeScript Client must be run from main. Current ref: ${{ github.ref }}"
              exit 1
              ;;
          esac

  test:
    needs: guard-allowed-branch
    uses: ./.github/workflows/test.yml
    secrets: inherit

  publish:
    name: Publish @solana/subscriptions package
    runs-on: ubuntu-latest
    needs: [guard-allowed-branch, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.7
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate IDL and clients
        run: |
          cd program && cargo build
          cd .. && pnpm run generate-clients

      - name: Build TypeScript client
        run: pnpm --filter "@solana/subscriptions" build

      - name: Publish TypeScript client
        id: npm_publish
        uses: solana-foundation/github-actions/npm-publish@f0ddc2234ac4ac19c5c17f520b60bc2d7308744f
        with:
          package: '@solana/subscriptions'
          package-directory: clients/typescript
          check-version-available: ${{ !inputs.dry-run }}
          dry-run: ${{ inputs.dry-run }}
          skip-existing: 'true'

      - name: Check if prerelease
        id: prerelease
        run: |
          if [ "${{ steps.npm_publish.outputs.tag }}" = "beta" ]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          TAG="ts-client-v${{ steps.npm_publish.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            echo "Created tag $TAG"
          fi
          git push origin "$TAG" 2>/dev/null || echo "Tag already pushed"

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry-run != 'true' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = `${{ steps.npm_publish.outputs.version }}`;
            const tagName = `ts-client-v${version}`;
            const releaseName = `TypeScript Client v${version}`;
            const isPrerelease = '${{ steps.prerelease.outputs.is_prerelease }}' === 'true';

            const body = [
              `## @solana/subscriptions v${version}`,
              '',
              '### Installation',
              '',
              '```bash',
              'pnpm add @solana/subscriptions',
              '```',
              '',
              `https://www.npmjs.com/package/@solana/subscriptions/v/${version}`,
            ].join('\n');

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });
              console.log(`Release ${tagName} already exists, skipping`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              body: body.trim(),
              draft: false,
              prerelease: isPrerelease,
            });

            console.log(`Created release: ${releaseName}`);

      - name: Publish summary
        run: |
          VERSION="${{ steps.npm_publish.outputs.version }}"
          NPM_TAG="${{ steps.npm_publish.outputs.tag }}"
          DRY_RUN="${{ github.event.inputs.dry-run }}"

          if [ "$DRY_RUN" == "true" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## TypeScript Client Publish — DRY RUN

          **Version**: \`${VERSION}\`
          **Package**: \`@solana/subscriptions\`
          **npm tag**: \`${NPM_TAG}\`
          **Mode**: Dry run (OIDC auth validated, no package uploaded, no tag, no release)

          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY << EOF
          ## TypeScript Client Published

          **Version**: \`${VERSION}\`
          **Package**: \`@solana/subscriptions\`
          **Tag**: \`ts-client-v${VERSION}\`
          **npm tag**: \`${NPM_TAG}\`

          Published to npm: https://www.npmjs.com/package/@solana/subscriptions/v/${VERSION}
          GitHub release: https://github.com/${{ github.repository }}/releases/tag/ts-client-v${VERSION}

          EOF
          fi
