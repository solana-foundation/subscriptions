name: Benchmark

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  pull-requests: write

env:
  SOLANA_VERSION: '4.0.0'

jobs:
  compute-units:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          rust-cache-key: 'benchmark'
          solana-version: ${{ env.SOLANA_VERSION }}

      - name: Run benchmark
        run: just test-and-benchmark

      - name: Report compute units
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: solana-foundation/github-actions/cu-benchmark@f0ddc2234ac4ac19c5c17f520b60bc2d7308744f
