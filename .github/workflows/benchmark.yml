name: Benchmark

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  SOLANA_VERSION: '4.0.0'

jobs:
  compute-units:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          rust-cache-key: 'benchmark'
          solana-version: ${{ env.SOLANA_VERSION }}

      - name: Run benchmark
        run: just test-and-benchmark

      - name: Post CU report comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          MARKER="<!-- cu-report -->"
          REPORT="$MARKER
          $(cat tests/integration-tests/cu_report.md)"

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$REPORT"
          else
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              -f body="$REPORT"
          fi
