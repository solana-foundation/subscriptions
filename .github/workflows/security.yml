name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          install-solana: 'false'
          install-just: 'false'
          install-pnpm: 'false'
          rust-cache-key: 'cargo-audit'
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  pnpm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          install-rust: 'false'
          enable-rust-cache: 'false'
          install-solana: 'false'
          install-just: 'false'
          install-pnpm-dependencies: 'false'
      - run: |
          report="${RUNNER_TEMP:-/tmp}/pnpm-audit.json"
          set +e
          pnpm audit --json > "$report"
          audit_status=$?
          set -e
          if [ "$audit_status" -eq 0 ]; then
            exit 0
          fi
          node - "$report" <<'NODE'
          const fs = require("node:fs");

          const report = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const advisories = Object.values(report.advisories ?? {});
          if (advisories.length === 0) {
            process.exit(1);
          }

          const isFixable = (advisory) => {
            const patchedVersions = advisory.patched_versions;
            return patchedVersions && patchedVersions !== "<0.0.0";
          };
          const fixable = advisories.filter(isFixable);

          for (const advisory of advisories.filter((advisory) => !isFixable(advisory))) {
            const id = advisory.github_advisory_id ?? advisory.cves?.[0] ?? advisory.id;
            console.log(`Ignoring unfixable advisory ${id}`);
          }

          if (fixable.length > 0) {
            console.error("Fixable pnpm advisories found:");
            for (const advisory of fixable) {
              const id = advisory.github_advisory_id ?? advisory.cves?.[0] ?? advisory.id;
              console.error(`- ${id}: ${advisory.module_name} patched by ${advisory.patched_versions}`);
            }
            process.exit(1);
          }
          NODE

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-toolchain: 'nightly'
          rust-components: 'miri'
          install-solana: 'false'
          install-just: 'false'
          install-pnpm: 'false'
          rust-cache-key: 'miri'
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.rust-lang.miri
          key: miri-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo +nightly miri setup
      - run: cargo +nightly miri test -p subscriptions-program
